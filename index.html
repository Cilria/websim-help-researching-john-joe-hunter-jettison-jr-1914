<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Research Portal</title>
    <style>
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #1a1a1c 0%, #0e0e0c 100%);
            color: #e2e2e2;
            margin: 0;
            padding: 20px;
            line-height: 1.55;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3em;
            color: #f0f0f0;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,.5);
        }
        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }
        .link-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,.5);
        }
        .link-title {
            font-size: 1.5em;
            color: #f0f0f0;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .link-description {
            color: #a0a0a0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Historical Research Portal</h1>
        <div class="links">
